[client]
name = "Rcode Desktop"
mode = "desktop"
description = "本地客户端 agent，可连接 AI 并在审批策略约束下控制电脑。"

[ai]
provider_config = "config/providers.json"
active_provider = "mimo"
temperature = 0.3
max_tokens = 16384

[permissions]
default_mode = "workspace_write"
require_approval_for_internet = true
require_approval_for_file_write = false
require_approval_for_shell = true

[computer_control]
enabled = true
shell = true
open_app = true
screenshot = true
keyboard_mouse = true
accessibility = true
dangerous_commands_require_approval = true

[computer_control.command_policy]
workspace_only = true
blocked = [
  "rm -rf /",
  "diskutil erase",
  "mkfs",
  "shutdown",
  "reboot"
]

# 密钥值只保存在本机 .env.local / 启动环境中。Agent 只能请求这里列出的变量名，
# 每次注入都需审批，工具输出还会按实际值自动脱敏。
[secrets]
allowed_env = [
  "GITHUB_PERSONAL_ACCESS_TOKEN",
  "CLOUDFLARE_API_TOKEN",
  "DATABASE_URL"
]

[[tools]]
name = "read_file"
risk = "medium"
enabled = true

[[tools]]
name = "write_file"
risk = "medium"
enabled = true

[[tools]]
name = "web_fetch"
risk = "medium"
enabled = true

[[tools]]
name = "project_diagnostics"
risk = "low"
enabled = true

[[tools]]
name = "docker_compose"
risk = "high"
enabled = true

[[tools]]
name = "sqlite_query"
risk = "high"
enabled = true

[[tools]]
name = "git_push"
risk = "high"
enabled = true

[[tools]]
name = "run_shell"
risk = "high"
enabled = true

[[tools]]
name = "start_process"
risk = "high"
enabled = true

[[tools]]
name = "read_process"
risk = "low"
enabled = true

[[tools]]
name = "write_process"
risk = "medium"
enabled = true

[[tools]]
name = "stop_process"
risk = "medium"
enabled = true

[[tools]]
name = "list_processes"
risk = "low"
enabled = true
