[client]
name = "Rcode Desktop"
mode = "desktop"
description = "本地客户端 agent，可连接 AI 并在审批策略约束下控制电脑。"

[ai]
provider_config = "config/providers.json"
active_provider = "mimo"
temperature = 0.3
max_tokens = 16384

[permissions]
default_mode = "workspace_write"
require_approval_for_internet = true
require_approval_for_file_write = false
require_approval_for_shell = true

[computer_control]
enabled = true
shell = true
open_app = false
screenshot = false
dangerous_commands_require_approval = true

[computer_control.command_policy]
workspace_only = true
blocked = [
  "rm -rf /",
  "sudo rm",
  "diskutil erase",
  "mkfs",
  "shutdown",
  "reboot"
]

[[tools]]
name = "read_file"
risk = "medium"
enabled = true

[[tools]]
name = "write_file"
risk = "medium"
enabled = true

[[tools]]
name = "web_fetch"
risk = "medium"
enabled = true

[[tools]]
name = "run_shell"
risk = "high"
enabled = true
